*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:24px 32px;border-bottom:1px solid #1e293b}

.tabs{display:flex;padding:0 32px;background:#1e293b;border-bottom:1px solid #334155}
.tab{padding:12px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#64748b;transition:all .2s}
.tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.tab:hover{color:#e2e8f0}
.panel{display:none;padding:24px 32px}
.panel.active{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.card h3{font-size:14px;color:#94a3b8;margin-bottom:16px;font-weight:500}
.chart{width:100%;height:320px}
.chart-lg{width:100%;height:420px}
#graph-container{width:100%;height:540px;background:#0f172a;border-radius:8px}
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 16px;color:#e2e8f0;font-size:14px;outline:none}
.search-bar input:focus{border-color:#38bdf8}
.search-bar select{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer}
.article-list{display:flex;flex-direction:column;gap:10px;max-height:640px;overflow-y:auto}
.article-card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px 16px;transition:border-color .2s;cursor:pointer}
.article-card:hover{border-color:#334155}
.art-title{font-size:14px;color:#e2e8f0;font-weight:500;margin-bottom:6px}
.art-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-bullish{background:#064e3b;color:#34d399}
.badge-bearish{background:#450a0a;color:#f87171}
.badge-neutral{background:#1e3a5f;color:#93c5fd}
.badge-theme{background:#2d1b69;color:#a78bfa}
.badge-asset{background:#1c2a1a;color:#86efac}

let CI = {};

function showTab(n) {
  const ns = ['overview','network','timeline','search'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ns[i]===n));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  if (!CI[n]) { CI[n]=1;
    if (n==='overview')  initOv();
    if (n==='network')   initNet();
    if (n==='timeline')  initTl();
    if (n==='search')    fa();
  }
}

function ec(id) { return echarts.init(document.getElementById(id)); }

function barOpt(d, col1, col2) {
  var names=[], vals=[];
  for (var i=0; i<d.length; i++) { names.push(d[i].name); vals.push(d[i].value); }
  return {
    backgroundColor:'transparent',
    tooltip:{trigger:'axis'},
    grid:{left:90,right:30,top:10,bottom:30},
    xAxis:{type:'value',axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'#1e293b'}}},
    yAxis:{type:'category',data:names,axisLabel:{color:'#94a3b8',fontSize:12}},
    series:[{type:'bar',data:vals,
      itemStyle:{color:{type:'linear',x:0,y:0,x2:1,y2:0,
        colorStops:[{offset:0,color:col1},{offset:1,color:col2}]}},
      label:{show:true,position:'right',color:'#94a3b8',fontSize:11}
    }]
  };
}
function pieOpt(d) {
  return {
    backgroundColor:'transparent',
    tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
    legend:{bottom:0,textStyle:{color:'#94a3b8',fontSize:11}},
    series:[{type:'pie',radius:['40%','68%'],center:['50%','44%'],data:d,
      label:{color:'#94a3b8',fontSize:11}}]
  };
}

function initOv() {
  ec('c-theme').setOption(barOpt(TD,'#1d4ed8','#38bdf8'));
  ec('c-asset').setOption(barOpt(ASD,'#065f46','#34d399'));
  ec('c-sent').setOption(pieOpt([
    {name:'看多',value:BULL,itemStyle:{color:'#34d399'}},
    {name:'看空',value:BEAR,itemStyle:{color:'#f87171'}},
    {name:'中性',value:NEU, itemStyle:{color:'#93c5fd'}}
  ]));
  var pcs=['#38bdf8','#34d399','#a78bfa','#fb923c'];
  ec('c-hz').setOption(pieOpt(TZ.map(function(d,i){
    return {name:d.name,value:d.value,itemStyle:{color:pcs[i%pcs.length]}};
  })));
  ec('c-monthly').setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    grid:{left:30,right:20,top:10,bottom:60},
    xAxis:{type:'category',data:TL,axisLabel:{color:'#64748b',fontSize:10,rotate:45},
      axisLine:{lineStyle:{color:'#334155'}}},
    yAxis:{type:'value',axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'#1e293b'}}},
    series:[{type:'bar',data:TT,itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,
      colorStops:[{offset:0,color:'#38bdf8'},{offset:1,color:'#1d4ed8'}]}}}]
  });
}

function initNet() {
  var colors = ['#38bdf8','#34d399','#a78bfa','#f472b6','#fb923c','#facc15'];
  var nodes = new vis.DataSet(GD.nodes.map(function(n) {
    return {id:n.id, label:n.id, value:n.value,
      color:{background:colors[n.group%colors.length],border:'#0f172a',
             highlight:{background:'#f8fafc',border:'#38bdf8'}},
      font:{color:'#f8fafc',size:Math.min(16,10+n.value/5)},borderWidth:2};
  }));
  var edges = new vis.DataSet(GD.edges.map(function(e) {
    return {from:e.from,to:e.to,value:e.value,
      color:{color:'#334155',highlight:'#38bdf8'},
      smooth:{type:'curvedCW',roundness:0.1}};
  }));
  new vis.Network(document.getElementById('graph-container'),{nodes:nodes,edges:edges},{
    physics:{stabilization:true,barnesHut:{gravitationalConstant:-4000,springLength:120}},
    interaction:{hover:true},
    nodes:{shape:'dot',scaling:{min:20,max:60}},
    edges:{scaling:{min:1,max:8}}
  });
}

function initTl() {
  ec('c-tl').setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
    legend:{top:0,textStyle:{color:'#94a3b8'}},
    grid:{left:40,right:20,top:40,bottom:60},
    xAxis:{type:'category',data:TL,axisLabel:{color:'#64748b',fontSize:11,rotate:45},
      axisLine:{lineStyle:{color:'#334155'}}},
    yAxis:{type:'value',axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'#1e293b'}}},
    series:[
      {name:'看多',type:'bar',stack:'s',data:TB, itemStyle:{color:'#34d399'}},
      {name:'看空',type:'bar',stack:'s',data:TBE,itemStyle:{color:'#f87171'}},
      {name:'中性',type:'bar',stack:'s',
        data:TT.map(function(t,i){return t-TB[i]-TBE[i];}),
        itemStyle:{color:'#334155'}},
      {name:'总量',type:'line',data:TT,itemStyle:{color:'#38bdf8'},
        lineStyle:{width:2},symbol:'circle',symbolSize:5}
    ]
  });
  var tbm={};
  TOP6.forEach(function(t){ tbm[t]=Array(TL.length).fill(0); });
  AD.forEach(function(r){
    var d=(r.date||'').slice(0,7), idx=TL.indexOf(d);
    if(idx>=0)(r.themes||[]).forEach(function(t){ if(tbm[t])tbm[t][idx]++; });
  });
  var tc=['#38bdf8','#34d399','#a78bfa','#f472b6','#fb923c','#facc15'];
  ec('c-tl2').setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    legend:{top:0,textStyle:{color:'#94a3b8',fontSize:12}},
    grid:{left:40,right:20,top:40,bottom:60},
    xAxis:{type:'category',data:TL,axisLabel:{color:'#64748b',fontSize:11,rotate:45},
      axisLine:{lineStyle:{color:'#334155'}}},
    yAxis:{type:'value',axisLabel:{color:'#64748b'},splitLine:{lineStyle:{color:'#1e293b'}}},
    series:TOP6.map(function(t,i){
      return {name:t,type:'line',data:tbm[t],itemStyle:{color:tc[i]},

    })
  });
}

function fa() {
  var q  = (document.getElementById('si').value||'').toLowerCase();
  var sen= document.getElementById('fs').value;
  var thm= document.getElementById('ft').value;
  var ast= document.getElementById('fat').value;
  var f  = AD.filter(function(r){
    if(sen && r.sentiment!==sen) return false;
    if(thm && (r.themes||[]).indexOf(thm)<0) return false;
    if(ast && (r.key_assets||[]).indexOf(ast)<0) return false;
    if(q){
      var h=((r.title||'')+(r.summary||'')+(r.core_viewpoints||[]).join(' ')).toLowerCase();
      if(h.indexOf(q)<0) return false;
    }
    return true;
  });
  f.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  document.getElementById('rc').textContent = '找到 '+f.length+' 篇文章';
  var list = document.getElementById('al');
  if(!f.length){ list.innerHTML='<div class="no-result">没有找到匹配的文章</div>'; return; }
  list.innerHTML = f.map(function(r){
    var sb = r.sentiment==='bullish'?'<span class="badge badge-bullish">看多</span>':
             r.sentiment==='bearish'?'<span class="badge badge-bearish">看空</span>':
             '<span class="badge badge-neutral">中性</span>';
    var tb = (r.themes||[]).slice(0,3).map(function(t){
      return '<span class="badge badge-theme">'+t+'</span>';}).join(' ');
    var ab = (r.key_assets||[]).slice(0,2).map(function(a){
      return '<span class="badge badge-asset">'+a+'</span>';}).join(' ');
    var vps= (r.core_viewpoints||[]).slice(0,2);
    var vh = vps.length?'<div class="art-vps">'+vps.map(function(v){
      return '<div class="art-vp">'+v+'</div>';}).join('')+'</div>':'';
    var lk = r.url?'onclick="window.open(\''+r.url+'\',\'_blank\')"':'';
    return '<div class="article-card" '+lk+'>'
      +'<div class="art-title">'+(r.date||'')+' &nbsp; '+(r.title||'')+'</div>'
      +'<div class="art-meta">'+sb+' '+tb+' '+ab+'</div>'
      +'<div class="art-summary">'+(r.summary||'')+'</div>'
      +vh+'</div>';
  }).join('');
}
