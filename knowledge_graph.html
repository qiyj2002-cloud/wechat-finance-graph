// ── 懒加载状态追踪 ───────────────────────────────────────────
const _rendered = {};
const _charts = [];

// ── 初始化 ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const m = RAW.meta;
  document.getElementById('headerMeta').textContent =
    `共 ${m.total_articles} 篇文章 · ${m.date_range.start} ~ ${m.date_range.end} · 生成于 ${m.generated_at}`;
  document.getElementById('statTotal').textContent = m.total_articles;
  document.getElementById('statAssets').textContent = Object.keys(RAW.top_assets).length;
  document.getElementById('statConcepts').textContent = Object.keys(RAW.top_concepts).length;

  // 只初始化当前可见的 Tab0
  renderTab(0);

  // 静态内容不依赖图表尺寸，直接初始化
  renderConceptCloud();
  renderArticleList(RAW.articles);
  renderInsight();

  // 统一 resize 监听
  window.addEventListener('resize', () => _charts.forEach(c => { try { c.resize(); } catch(e) {} }));
});

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  // 切换后渲染（懒加载）或 resize（已渲染）
  setTimeout(() => renderTab(idx), 50);
}

function renderTab(idx) {
  if (_rendered[idx]) {
    // 已渲染过，只需 resize 让 ECharts 重新适配容器尺寸
    _charts.forEach(c => { try { c.resize(); } catch(e) {} });
    return;
  }
  _rendered[idx] = true;
  if (idx === 0) { renderGraph(); }
  if (idx === 1) { renderTimeline(); renderTypeChart(); }
  if (idx === 2) { renderAssetBar(); renderAssetView(); }
  if (idx === 3) { renderMethodChart(); }
  // idx === 4 文章列表已在 DOMContentLoaded 中初始化，无需重复
}

// ── Tab0: 知识图谱 ────────────────────────────────────────────
function renderGraph() {
  const chart = echarts.init(document.getElementById('graphChart'), 'dark');
  _charts.push(chart);
  const nodes = [];
  const edges = [];
  const nodeSet = new Set();

  // 资产节点
  Object.entries(RAW.top_assets).slice(0,30).forEach(([name, info]) => {
    nodeSet.add(name);
    const size = Math.min(60, 15 + info.count * 3);
    const colorMap = { '股票':'#f7b87e', 'ETF':'#7eb8f7', '指数':'#7ecff7', '人物':'#c87ef7' };
    nodes.push({
      id: name, name, symbolSize: size,
      itemStyle: { color: colorMap[info.type] || '#7eb8f7' },
      category: info.type,
      value: info.count,
      label: { show: size > 25 }
    });
  });

  // 概念节点
  Object.entries(RAW.top_concepts).slice(0,25).forEach(([name, count]) => {
    nodeSet.add(name);
    const size = Math.min(45, 10 + count * 2);
    nodes.push({
      id: name, name, symbolSize: size,
      itemStyle: { color: '#5ecf9e' },
      category: '概念',
      value: count,
      label: { show: size > 20 }
    });
  });

  // 边
  RAW.graph_edges.forEach(e => {
    if (nodeSet.has(e.source) && nodeSet.has(e.target)) {
      edges.push({
        source: e.source, target: e.target,
        lineStyle: { width: Math.min(4, e.weight * 0.5), opacity: 0.4 }
      });
    }
  });

  chart.setOption({
    backgroundColor: '#141824',
    tooltip: { formatter: p => p.dataType==='node' ? `${p.name}<br/>提及 ${p.value} 次` : '' },
    legend: [{ data: ['股票','ETF','指数','人物','概念'], textStyle: { color:'#9ab' }, top:10 }],
    series: [{
      type: 'graph', layout: 'force',
      data: nodes, edges,
      categories: ['股票','ETF','指数','人物','概念'].map(n => ({name:n})),
      roam: true, draggable: true,
      force: { repulsion: 200, gravity: 0.05, edgeLength: [80,200] },
      label: { position:'right', fontSize:11, color:'#ccc' },
      lineStyle: { color:'#3a4a6a', curveness: 0.1 },
      emphasis: { focus:'adjacency', lineStyle:{ width:3 } }
    }]
  });
}

// ── Tab1: 时间线 ──────────────────────────────────────────────
function renderTimeline() {
  const chart = echarts.init(document.getElementById('timelineChart'), 'dark');
  _charts.push(chart);
  const sentMap = { '乐观':1, '中性':0, '谨慎':-1, '悲观':-2 };
  const colorMap = { '乐观':'#5ecf5e', '中性':'#9a9a9a', '谨慎':'#f7a05e', '悲观':'#f75e5e' };

  const byMonth = {};
  RAW.sentiment_timeline.forEach(item => {
    const month = item.date.slice(0,7);
    if (!byMonth[month]) byMonth[month] = { 乐观:0, 中性:0, 谨慎:0, 悲观:0 };
    byMonth[month][item.sentiment] = (byMonth[month][item.sentiment]||0) + 1;
  });

  const months = Object.keys(byMonth).sort();
  const series = ['乐观','中性','谨慎','悲观'].map(s => ({
    name: s, type: 'bar', stack: 'total',
    data: months.map(m => byMonth[m][s]||0),
    itemStyle: { color: colorMap[s] }
  }));

  chart.setOption({
    backgroundColor:'#141824',
    tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
    legend: { textStyle:{ color:'#9ab' }, top:5 },
    grid: { left:40, right:20, top:40, bottom:60 },
    xAxis: { type:'category', data:months, axisLabel:{ rotate:45, color:'#6b7a99', fontSize:10 } },
    yAxis: { type:'value', axisLabel:{ color:'#6b7a99' } },
    series
  });
}

function renderTypeChart() {
  const chart = echarts.init(document.getElementById('typeChart'), 'dark');
  _charts.push(chart);
  const colors = ['#7eb8f7','#7ecf9e','#f7b87e','#c87ef7','#f7e07e','#7ecff7'];
  const data = Object.entries(RAW.type_distribution).map(([name,value],i) => ({
    name, value, itemStyle:{ color:colors[i%colors.length] }
  }));
  chart.setOption({
    backgroundColor:'#141824',
    tooltip: { trigger:'item', formatter:'{b}: {c} 篇 ({d}%)' },
    legend: { orient:'vertical', right:20, textStyle:{ color:'#9ab' } },
    series: [{ type:'pie', radius:['40%','70%'], center:['40%','50%'], data,
      label:{ color:'#ccc' }, emphasis:{ itemStyle:{ shadowBlur:10 } } }]
  });
}

// ── Tab2: 资产热图 ────────────────────────────────────────────
function renderAssetBar() {
  const chart = echarts.init(document.getElementById('assetBarChart'), 'dark');
  _charts.push(chart);
  const top20 = Object.entries(RAW.top_assets).slice(0,20);
  const names = top20.map(([n]) => n).reverse();
  const counts = top20.map(([,v]) => v.count).reverse();
  const typeColors = { '股票':'#f7b87e', 'ETF':'#7eb8f7', '指数':'#7ecff7', '人物':'#c87ef7' };
  const barColors = top20.map(([,v]) => typeColors[v.type]||'#7eb8f7').reverse();

  chart.setOption({
    backgroundColor:'#141824',
    tooltip: { trigger:'axis', axisPointer:{ type:'shadow' } },
    grid: { left:80, right:30, top:20, bottom:20 },
    xAxis: { type:'value', axisLabel:{ color:'#6b7a99' } },
    yAxis: { type:'category', data:names, axisLabel:{ color:'#ccc', fontSize:12 } },
    series: [{ type:'bar', data:counts.map((v,i)=>({value:v,itemStyle:{color:barColors[i]}})),
      label:{ show:true, position:'right', color:'#9ab' } }]
  });
}

function renderAssetView() {
  const chart = echarts.init(document.getElementById('assetViewChart'), 'dark');
  _charts.push(chart);
  const viewAgg = { 看多:0, 持有:0, 看空:0, 提及:0 };
  Object.values(RAW.top_assets).forEach(info => {
    Object.entries(info.views||{}).forEach(([v,c]) => { viewAgg[v] = (viewAgg[v]||0)+c; });
  });
  const colors = { 看多:'#5ecf5e', 持有:'#7eb8f7', 看空:'#f75e5e', 提及:'#9a9a9a' };
  const data = Object.entries(viewAgg).map(([name,value]) => ({ name, value, itemStyle:{ color:colors[name] } }));
  chart.setOption({
    backgroundColor:'#141824',
    tooltip: { trigger:'item', formatter:'{b}: {c} 次 ({d}%)' },
    legend: { textStyle:{ color:'#9ab' } },
    series: [{ type:'pie', radius:'60%', data,
      label:{ color:'#ccc', formatter:'{b}\n{c}次' },
      emphasis:{ itemStyle:{ shadowBlur:10 } } }]
  });
}

// ── Tab3: 分析框架 ────────────────────────────────────────────
function renderMethodChart() {
  const chart = echarts.init(document.getElementById('methodChart'), 'dark');
  _charts.push(chart);
  const data = Object.entries(RAW.method_frequency).sort((a,b)=>b[1]-a[1]);
  chart.setOption({
    backgroundColor:'#141824',
    tooltip: { trigger:'axis' },
    grid: { left:80, right:20, top:10, bottom:10 },
    xAxis: { type:'value', axisLabel:{ color:'#6b7a99' } },
    yAxis: { type:'category', data:data.map(([n])=>n).reverse(), axisLabel:{ color:'#ccc' } },
    series: [{ type:'bar', data:data.map(([,v])=>v).reverse(),
      itemStyle:{ color:'#7eb8f7' },
      label:{ show:true, position:'right', color:'#9ab' } }]
  });
}

function renderConceptCloud() {
  const container = document.getElementById('conceptCloud');
  const maxCount = Math.max(...Object.values(RAW.top_concepts));
  const colors = ['#7eb8f7','#7ecf9e','#f7b87e','#c87ef7','#f7e07e','#7ecff7','#5ecf5e','#f7a05e'];
  Object.entries(RAW.top_concepts).forEach(([name, count], i) => {
    const size = 11 + Math.round((count / maxCount) * 14);
    const el = document.createElement('span');
    el.className = 'concept-tag';
    el.textContent = name;
    el.style.cssText = `font-size:${size}px;background:${colors[i%colors.length]}22;color:${colors[i%colors.length]};border:1px solid ${colors[i%colors.length]}44`;
    el.title = `出现 ${count} 次`;
    container.appendChild(el);
  });
}

function renderInsight() {
  const topAssets = Object.keys(RAW.top_assets).slice(0,5).join('、');
  const topConcepts = Object.keys(RAW.top_concepts).slice(0,6).join('、');
  const typeEntries = Object.entries(RAW.type_distribution).sort((a,b)=>b[1]-a[1]);
  const mainType = typeEntries[0][0];
  const total = RAW.meta.total_articles;
  const optimistic = RAW.sentiment_timeline.filter(x=>x.sentiment==='乐观').length;
  const cautious = RAW.sentiment_timeline.filter(x=>x.sentiment==='谨慎').length;

  document.getElementById('insightText').innerHTML = `
    基于对 <strong style="color:#7eb8f7">${total}</strong> 篇文章的分析，金渐成的内容以
    <strong style="color:#7eb8f7">${mainType}</strong> 为主（占比最高），
    覆盖 2023 年至今的市场观察。<br><br>
    在资产偏好上，最常提及的标的为 <strong style="color:#f7b87e">${topAssets}</strong>，
    体现出对美股科技龙头和全球指数的持续关注。<br><br>
    核心投资理念围绕 <strong style="color:#7ecf9e">${topConcepts}</strong> 展开，
    体现了价值投资与长期持有的方法论体系。<br><br>
    情绪分布上，乐观文章 <strong style="color:#5ecf5e">${optimistic}</strong> 篇，
    谨慎文章 <strong style="color:#f7a05e">${cautious}</strong> 篇，
    整体风格偏理性审慎，注重风险控制。
  `;
}

// ── Tab4: 文章列表 ────────────────────────────────────────────
function renderArticleList(articles) {
  const container = document.getElementById('articleList');
  container.innerHTML = '';
  articles.forEach(a => {
    const div = document.createElement('div');
    div.className = 'article-item';
    const assets = (a.assets||[]).slice(0,4).join(' · ') || '—';
    const concepts = (a.concepts||[]).slice(0,3).join(' · ') || '—';
    div.innerHTML = `
      <div class="article-title">${a.title || '(无标题)'}</div>
      <div class="article-meta">
        <span>${a.date}</span>
        <span class="tag tag-type-${a.type}">${a.type}</span>
        <span class="tag tag-sent-${a.sentiment}">${a.sentiment}</span>
        <span style="color:#4a6a88">资产: ${assets}</span>
        <span style="color:#4a6a88">概念: ${concepts}</span>
      </div>
    `;
    if (a.url) div.onclick = () => window.open(a.url, '_blank');
    container.appendChild(div);
  });
}

function filterArticles() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderArticleList(RAW.articles); return; }
  const filtered = RAW.articles.filter(a =>
    (a.title||'').toLowerCase().includes(q) ||
    (a.assets||[]).some(x => x.toLowerCase().includes(q)) ||
    (a.concepts||[]).some(x => x.toLowerCase().includes(q)) ||
    (a.type||'').includes(q)
  );
  renderArticleList(filtered);
}
